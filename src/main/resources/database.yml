# local database
#   SQLite

# remote database
#   MySQL
#   MariaDB (preferred over MySQL)
#
data-storage-method: SQLite

SQLite:
  # Name of the .db file (without extension) inside the plugin's data folder
  file: 'BrewMarket'
  # Leave empty to keep the legacy table name 'sell_history' (no prefix)
  table-prefix: 'brewmarket'

MySQL:
  host: 'localhost'
  port: '3306'
  user: 'root'
  password: 'password'
  database: 'minecraft'
  connection-parameters: '?useSSL=false&useUnicode=true&characterEncoding=UTF-8'
  Pool-Settings:
    max-pool-size: 10
    min-idle: 10
    max-lifetime: 180000
    keep-alive-time: 60000
    time-out: 20000
  table-prefix: brewmarket

MariaDB:
  host: 'localhost'
  port: '3306'
  user: 'root'
  password: 'password'
  database: 'minecraft'
  connection-parameters: '?useUnicode=true&characterEncoding=UTF-8'
  Pool-Settings:
    max-pool-size: 10
    min-idle: 10
    max-lifetime: 180000
    keep-alive-time: 60000
    time-out: 20000
  table-prefix: brewmarket